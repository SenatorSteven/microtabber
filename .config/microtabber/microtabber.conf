set window-x 0 integer;
set window-y 0 integer;
set window-x-offset 0 integer;
set window-y-offset 0 integer;
set window-width "24 + 4 * 320 + 3 * 12" integer;
set window-height 90 percentage;
set window-horizontal-alignment center;
set window-vertical-alignment center;
set window-corner-radius 12 top-left | top-right | bottom-left | bottom-right;
set window-background 0xFF171717;

set selection-x 12 integer;
set selection-y 12 integer;
set selection-x-offset 0 integer;
set selection-y-offset 0 integer;
set selection-width 320 integer;
set selection-height 220 integer;
set selection-margin 12 integer;
set selection-horizontal-alignment none;
set selection-vertical-alignment none;
set selection-clip-children true;
set selection-background 0xFF171717;
set selection-selected-background 0xFF1793D0;

set client-x 0 integer;
set client-y 0 integer;
set client-x-offset 0 integer;
